<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ghost Writer</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="shell">
    <section class="title-card" aria-label="Game introduction">
      <p class="eyebrow">1947. Rain on the windows. Ink on the floor.</p>
      <h1>Ghost Writer</h1>
      <p>A haunted typewriter noir adventure prototype.</p>
    </section>
    <canvas id="game" width="960" height="540" aria-label="Ghost Writer prototype canvas"></canvas>
    <section class="hud-help">
      <p><strong>Move:</strong> WASD / Arrows</p>
      <p><strong>Type:</strong> letters, Enter to commit</p>
      <p><strong>Toggle:</strong> H for Hardboiled Mode</p>
      <p><strong>Restart:</strong> R</p>
    </section>
  </main>
  <script type="module" src="src/main.js"></script>
</body>
</html>

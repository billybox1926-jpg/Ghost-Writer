name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: npm run smoke

      - name: Unit tests
        run: npm test

      - name: Whitespace check
        run: git diff --check

      - name: Node syntax check (main)
        run: node --check src/main.js

      - name: Node syntax check (audio engine)
        run: node --check src/audio-engine.js

      - name: Node syntax check (browser smoke)
        run: node --check scripts/browser-smoke.mjs

      - name: Optional browser smoke
        run: npm run smoke:browser
